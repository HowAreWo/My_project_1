server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/couplegame;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      fail-on-empty-beans: false

app:
  jwt-secret: couple-game-secret-key-2024-very-long-secure-key!!
